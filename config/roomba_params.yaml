# Roomba ROS2 node parameters
# Loaded by launch files in launch/

# --- roomba_node ---
roomba_node:
  ros__parameters:
    # Serial port connected to Roomba Mini-DIN 7-pin connector
    # Check with: ls /dev/ttyS* /dev/ttyAMA*
    serial_port: "/dev/ttyUSB0"
    use_stub: false

    # Maximum wheel speed [mm/s] applied to both drive commands (0-500)
    max_speed_mm_s: 200

    # OI mode: "safe" (stops on cliff/bump) or "full" (all safety off)
    oi_mode: "safe"

# --- keyboard_node ---
# Note: keyboard_node must be run in a separate terminal (requires stdin).
#   bazel run //keyboard_node:keyboard_node
keyboard_node:
  ros__parameters:
    # Forward/backward speed [mm/s]
    forward_speed_mm_s: 150
    # Spin turn speed [mm/s] (inner wheel reversed)
    turn_speed_mm_s: 100
    # Auto-stop delay [ms]: stop if no key pressed for this duration
    auto_stop_ms: 500

# --- monitor_node ---
monitor_node:
  ros__parameters:
    # Dashboard refresh interval [ms]
    refresh_rate_ms: 500

# --- tof_node (VL53L1X Time-of-Flight sensor) ---
# Publishes /tof/distance_mm (std_msgs/UInt16) at poll_rate_ms interval.
# Wiring: VL53L1X SDA→GPIO2(pin3), SCL→GPIO3(pin5), VCC→3.3V, GND→GND
# Enable I2C on RPi Ubuntu: add "dtparam=i2c_arm=on" to /boot/firmware/config.txt and reboot
# (raspi-config is Raspberry Pi OS only; not available on Ubuntu)
# Check device: i2cdetect -y 1  (should show 0x29)
tof_node:
  ros__parameters:
    # Linux I2C bus device (RPi5: /dev/i2c-1 for GPIO2/3)
    i2c_device: "/dev/i2c-1"
    # VL53L1X default I2C address (0x29 = 41)
    i2c_address: 41
    # false = real sensor, true = stub (returns 200 mm)
    use_stub: false
    # Sensor poll interval [ms]
    poll_rate_ms: 50
    # Median filter window size (1 = disabled, max 9).
    # Reduces high-frequency noise; larger window = smoother but slightly more lag.
    filter_window_size: 5

# --- planner_node (wall-following) ---
planner_node:
  ros__parameters:
    # Update rate [ms] — should match roomba_node sensor poll rate
    update_rate_ms: 50

    # Integral gain (I term). Start at 0 (disabled). Increase slowly to
    # eliminate steady-state offset. Anti-windup clamps i_error so that
    # ki * i_error <= max_correction_mm_s.
    ki: 0.0

    # Corner detection: when the wall signal changes rapidly (|d_error| > threshold),
    # speed is reduced to corner_speed_ratio to prevent overshooting bends.
    # Increase threshold to make detection less sensitive.
    corner_detect_threshold: 50
    corner_speed_ratio: 0.6

    # Odometry correction: compensates heading drift while wall-following.
    # Set angle_gain > 0 to activate (start with 1.0 and tune).
    # Only fires when |angle_delta_deg| > straight_angle_threshold.
    angle_gain: 0.0
    straight_angle_threshold: 2

    # ToF integration: set use_tof=true to use VL53L1X instead of Roomba IR wall sensor.
    # tof_max_range_mm: distance [mm] treated as "no wall" (wall_signal=0).
    # Conversion: wall_signal = max(0, tof_max_range_mm - distance_mm)
    # All signal thresholds below must be consistent with tof_max_range_mm:
    #   physical distance = tof_max_range_mm - wall_signal
    # Example with tof_max_range_mm=1000:
    #   distance=400mm → wall_signal=600 → on target (target_wall_signal=600)
    #   distance=200mm → wall_signal=800 → emergency avoidance fires
    #   distance=600mm → wall_signal=400 → wall detected
    use_tof: true
    tof_max_range_mm: 1000

    # WallFollower parameters — tuned for tof_max_range_mm=1000, target distance ~130mm
    base_speed_mm_s: 80
    target_wall_signal: 870  # target distance: 1000-870 = 130mm from wall
    kp: 0.4
    kd: 5.0  # derivative gain: damps oscillation (lower = less jitter from sensor noise)
    # wall_detect_threshold: wall is "found" when wall_signal >= this value.
    # tof_max_range_mm=1000: signal=400 means distance=600mm → start following within 600mm
    wall_detect_threshold: 400
    max_correction_mm_s: 50

    # Cliff debounce: number of consecutive cliff readings required before
    # reacting.  At 20 Hz: 3 = 150 ms.  Increase if false positives persist.
    cliff_debounce_count: 3
    search_turn_bias_mm_s: 20  # drift right to re-acquire wall; 0 = straight, 30 = too tight

    # Emergency avoidance: fires when wall_signal exceeds this value,
    # bypassing P-control to avoid contact before bumper triggers.
    # tof_max_range_mm=1000: signal=940 means distance=60mm → emergency when within 60mm
    wall_too_close_threshold: 940
    emergency_turn_speed_mm_s: 80

    # Recovery: two-phase (straight backup → spin left)
    # Phase 1: straight reverse for clearance (~48 mm at 80 mm/s for 600 ms)
    recovery_backup_ms: 600
    recovery_backup_speed_mm_s: 80
    # Phase 2: spin left to reorient (~54° at 80 mm/s for 800 ms)
    recovery_turn_ms: 800
    recovery_turn_speed_mm_s: 80

# --- foxglove_bridge ---
# Install: sudo apt install ros-jazzy-foxglove-bridge
# Connect Foxglove Studio to: ws://<raspberry-pi-ip>:8765
foxglove_bridge:
  ros__parameters:
    # WebSocket port
    port: 8765
    # Listen address (0.0.0.0 = all interfaces, including Wi-Fi)
    address: "0.0.0.0"
    # TLS (disabled for local network use)
    tls: false
